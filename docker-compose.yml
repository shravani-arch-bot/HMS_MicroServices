services:
  eureka-server:
    image: eureka-server
    ports:
      - "8761:8761"

  patient-service:
    image: patient-service
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://host.docker.internal:3306/patient_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: Shravani@MySQL
    depends_on:
      - eureka-server

  auth-service:
    image: auth-service
    ports:
      - "8084:8084"
    environment:
      DB_URL: jdbc:mysql://host.docker.internal:3306/auth_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: Shravani@MySQL
    depends_on:
      - eureka-server

  billing-service:
    image: billing-service
    ports:
      - "8083:8083"
    environment:
      DB_URL: jdbc:mysql://host.docker.internal:3306/billing_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: Shravani@MySQL
    depends_on:
      - eureka-server

  appointment-service:
    image: appointment-service
    ports:
      - "8082:8082"
    environment:
      DB_URL: ${PATIENT_DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - eureka-server
      - patient-service
      - billing-service

  api-gateway:
    image: api-gateway
    ports:
      - "9090:9090"
    depends_on:
      - eureka-server
      - patient-service
      - auth-service
      - billing-service
      - appointment-service