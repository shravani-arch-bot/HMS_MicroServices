spring.application.name=api-gateway
server.port=9090

eureka.client.service-url.defaultZone=http://host.docker.internal:8761/eureka/

spring.cloud.gateway.server.webmvc.routes[0].id=patient-service
spring.cloud.gateway.server.webmvc.routes[0].uri=http://host.docker.internal:8080
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/patients/**

spring.cloud.gateway.server.webmvc.routes[1].id=appointment-service
spring.cloud.gateway.server.webmvc.routes[1].uri=http://host.docker.internal:8082
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/appointments/**

spring.cloud.gateway.server.webmvc.routes[2].id=billing-service
spring.cloud.gateway.server.webmvc.routes[2].uri=http://host.docker.internal:8083
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/bills/**

spring.cloud.gateway.server.webmvc.routes[3].id=auth-service
spring.cloud.gateway.server.webmvc.routes[3].uri=http://host.docker.internal:8084
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/auth/**